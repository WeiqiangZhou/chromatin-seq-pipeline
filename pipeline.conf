# =============================================================================
# pipeline.conf — user-configurable paths for the ChIP-seq / CUT&RUN pipeline
#
# Edit the values in this file to match your HPC environment.
# All three pipeline scripts (pipeline_submit.sh, pipeline_align.sh,
# pipeline_bam2bw.sh) source this file automatically from the same directory.
# =============================================================================

# -----------------------------------------------------------------------------
# Tool paths
# Provide the full path to each JAR or executable.
# Tilde (~) expansion works here; $HOME is also accepted.
# -----------------------------------------------------------------------------

# Trimmomatic JAR
TRIMMOMATIC_JAR=$HOME/Trimmomatic-0.39/trimmomatic-0.39.jar

# Adapter sequences used by Trimmomatic ILLUMINACLIP
TRIMMOMATIC_ADAPTERS=$HOME/Trimmomatic-0.39/adapters/TruSeq3-PE-2.fa

# Picard JAR
PICARD_JAR=/path/to/picard.jar

# -----------------------------------------------------------------------------
# Genome index prefixes (bowtie2 — do NOT include the .bt2 / .bt2l extension)
# -----------------------------------------------------------------------------

# Main genome (e.g. mouse mm10, human hg38)
BOWTIE2_INDEX_MAIN=/path/to/bowtie2_index/mm10

# Spike-in genome (only used when --spike is passed to pipeline_submit.sh)
# Default: Drosophila melanogaster BDGP6
BOWTIE2_INDEX_SPIKE=/path/to/bowtie2_index/BDGP6

# -----------------------------------------------------------------------------
# Environment modules
# Set each variable to the exact module name to load, or leave empty ("") to
# skip module loading (e.g. if tools are already on PATH or managed by conda).
# -----------------------------------------------------------------------------

MODULE_BOWTIE2=bowtie2      # loaded during alignment
MODULE_SAMTOOLS=samtools    # loaded during alignment and bigWig generation
MODULE_DEEPTOOLS=deeptools  # loaded during bigWig generation (provides bamCoverage)
